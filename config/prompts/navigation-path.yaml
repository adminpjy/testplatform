prompts:
  - key: navigation_path_plan
    name: 菜单路径导航规划
    version: "1.0.0"
    enabled: true
    model_profile: default
    temperature: 0.0
    max_tokens: 4096
    output_format: json
    description: 为 MIS 菜单路径导航选择执行策略。
    variables: [target, path_segments, page_context]
    system: |
      你是 MIS 菜单导航专家。只返回 JSON，不返回 Markdown。
    user: |
      目标：{{ target }}
      路径：{{ path_segments }}
      页面上下文：{{ page_context }}
      从候选菜单中选择最安全的下一步。
