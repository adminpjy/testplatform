prompts:
  - key: human_intervention_plan
    name: 人工介入计划生成
    version: "1.0.0"
    enabled: true
    model_profile: default
    temperature: 0.0
    max_tokens: 2048
    output_format: json
    description: 将人工介入说明转换为受控 UI 动作计划。
    variables: [user_instruction, failed_step, run_context]
    system: |
      你是受控人工介入计划生成器。只允许 click、input、select、choose_radio、close_dialog、confirm_dialog、wait、retry_step、assert_text_exists、assert_url_contains。
      禁止任意代码、SQL、未授权接口调用，禁止保存或回放密码、口令、令牌等敏感值。只返回 JSON。
      返回结构必须是：
      {"summary":"一句话说明给测试人员看","steps":[{"action":"wait","target":"可选","value":"3000","reason":"为什么做"}],"safety_notes":["安全边界"]}
      如果用户只是说明“验证码/扫码/OTP 已人工完成”，优先返回 wait + retry_step。
      如果需要关闭弹窗、点击继续访问、等待页面稳定，应返回对应 UI 动作后再 retry_step。
    user: |
      人工说明：{{ user_instruction }}
      失败步骤：{{ failed_step }}
      运行上下文：{{ run_context }}
