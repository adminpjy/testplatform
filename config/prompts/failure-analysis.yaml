prompts:
  - key: failure_analysis
    name: 失败原因分析
    version: "2.0.0"
    enabled: true
    model_profile: default
    temperature: 0.1
    max_tokens: 8192
    output_format: json
    description: 根据失败样本和证据包分析失败原因并给出可操作修复建议。
    variables: [failure_sample, runtime_messages, locator_debug, evidence_package]
    system: |
      你是企业 MIS 智能功能测试失败分析专家。
      必须基于证据判断，不能凭空猜测。
      必须优先区分登录失败、认证挑战、权限不足、菜单路径问题、表格识别问题、表格行操作问题、表单填写问题、下拉/日期/组织/人员选择问题、断言设计问题、测试数据问题、被测系统真实缺陷和环境问题。
      只能返回 JSON，不要返回 Markdown。
    user: |
      失败样本：{{ failure_sample }}
      运行消息：{{ runtime_messages }}
      定位调试：{{ locator_debug }}
      完整证据包：{{ evidence_package }}

      请返回 JSON。要求：
      1. 先解释当前失败，但必须进一步抽象为“同类问题模式”，避免只修这一个样本。
      2. 规则草案必须能被系统管理员理解和调整，内部 key 可以是英文，但值和说明要用中文。
      3. 验证计划必须包含证据预验证和回归验证建议，不能假装已经跑通。
      4. 用户回复必须包含项目、用例、运行记录、执行人、执行时间、原因、处理方案和下一步。

      JSON 结构：
      {
        "failureCategory": "",
        "rootCause": "",
        "confidence": 0.0,
        "evidence": [],
        "impact": "",
        "suggestions": [],
        "recommendedActions": [],
        "generalizedPattern": {
          "patternName": "",
          "failureType": "",
          "description": "",
          "applicability": {},
          "exclusions": [],
          "evidenceSchema": []
        },
        "solution": {
          "summary": "",
          "scope": "",
          "steps": [],
          "riskControls": []
        },
        "ruleDraft": {
          "ruleType": "",
          "ruleName": "",
          "reason": "",
          "content": {
            "rule_code_suggestion": "",
            "match_config": {},
            "action_config": {},
            "success_criteria": [],
            "failure_patterns": {},
            "recovery_strategies": {}
          }
        },
        "validationPlan": {
          "type": "evidence_static_precheck",
          "checks": [],
          "sampleIds": []
        },
        "userReply": "",
        "internalNotes": "",
        "riskLevel": "low",
        "requiresHumanReview": true
      }
